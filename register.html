<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account | Tear-Tune</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: radial-gradient(circle at center, #1a1a1a, #000); display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); width: 400px; text-align: center;">
        <h2 style="color: #1db954; font-size: 30px;">Join Tear-Tune</h2>
        <div style="margin-top: 30px;">
            <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
            <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
            <button onclick="register()" style="width: 100%; padding: 14px; background: #1db954; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;">Create Account</button>
        </div>
        <p style="margin-top: 25px; font-size: 13px;">Already joined? <a href="login.html" style="color: #1db954; text-decoration: none;">Login here</a></p>
    </div>
    <script>
        function register() {
            let u = document.getElementById("username").value;
            let p = document.getElementById("password").value;
            if(u.length < 3 || p.length < 4) { alert("Too short!"); return; }
            localStorage.setItem("regUser", u);
            localStorage.setItem("regPass", p);
            alert("Welcome, " + u + "!");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
