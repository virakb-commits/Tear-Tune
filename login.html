<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | Tear-Tune</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: radial-gradient(circle at center, #1a1a1a, #000); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 380px; text-align: center; }
        .input-group input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: white; }
        .login-btn { width: 100%; padding: 12px; background: #1db954; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .social-btn { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .google { background: white; color: #444; }
        /* Mobile Fix for Login Page */
        @media (max-width: 600px) {
            body {
                padding: 15px; /* Adds space around the screen edges */
            }

            .login-box {
                width: 100% !important; /* Box fills the width of the phone */
                max-width: 380px;
                padding: 30px 20px !important; /* Reduced padding for more space */
                border-radius: 16px !important;
            }

            .login-box h2 {
                font-size: 24px !important;
                margin-bottom: 20px !important;
            }

            .input-group input {
                padding: 14px !important; /* Larger touch area for fingers */
                font-size: 16px !important; /* Prevents iPhone from auto-zooming on tap */
                margin: 8px 0 !important;
            }

            .login-btn, .social-btn {
                padding: 14px !important;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #1db954; font-size: 28px; margin-bottom: 30px;">Tear-Tune</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" onclick="login()">Sign In</button>
        </div>
        <div style="margin: 25px 0; color: #666; font-size: 12px;">OR</div>
        <button class="social-btn google" onclick="socialLogin('Google')">Continue with Google</button>
        <p style="margin-top: 20px; font-size: 13px;">New? <a href="register.html" style="color: #1db954;">Create Account</a></p>
    </div>
    <script>
        function login() {
            let u = document.getElementById("username").value;
            let p = document.getElementById("password").value;
            if (u === localStorage.getItem("regUser") && p === localStorage.getItem("regPass") && u !== "") {
                localStorage.setItem("username", u);
                window.location.href = "index.html";
            } else { alert("Invalid credentials!"); }
        }
        function socialLogin(p) { localStorage.setItem("username", p + " User"); window.location.href = "index.html"; }
    </script>
</body>
</html>
